<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Snake Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    h1 { font-size: 1.35rem; margin-bottom: 6px; color: #22c55e; }
    #status {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 10px;
      text-align: center;
      line-height: 1.4;
      max-width: 100%;
      padding: 0 8px;
    }
    .game-wrap {
      position: relative;
      width: min(600px, 100vw - 24px);
      max-width: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 2px solid #282828;
      border-radius: 4px;
      touch-action: none;
      background: #0a0a0a;
    }
    #game-over-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
      border-radius: 4px;
      z-index: 10;
    }
    #game-over-overlay.show { display: flex; }
    #game-over-overlay h2 {
      font-size: 1.75rem;
      color: #fff;
    }
    #overlay-score {
      font-size: 1.25rem;
      color: #22c55e;
      font-weight: 600;
    }
    #overlay-restart {
      margin-top: 8px;
      min-width: 200px;
      min-height: 52px;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #overlay-restart:active { background: #16a34a; }
    #controls {
      margin-top: 12px;
      display: none;
      grid-template-columns: repeat(3, minmax(64px, 1fr));
      grid-template-rows: repeat(3, 64px);
      gap: 8px;
      width: min(220px, 100%);
      max-width: 100%;
    }
    #controls button {
      background: #16a34a;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #controls button:active { background: #22c55e; }
    #controls .empty { visibility: hidden; pointer-events: none; }
    #action-bar {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 400px;
    }
    #action-bar button {
      flex: 1;
      min-width: 140px;
      min-height: 48px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #pause-btn { background: #374151; }
    #pause-btn:active { background: #4b5563; }
    #restart-btn {
      background: #22c55e;
      display: none;
    }
    #restart-btn.show { display: block; }
    #restart-btn:active { background: #16a34a; }

    /* Phones & tablets: show touch UI (works in landscape too) */
    @media (hover: none) and (pointer: coarse), (max-width: 900px) {
      #controls { display: grid; }
    }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <p id="status">Tap arrows to move · Pause below · Play Again after game over</p>

  <div class="game-wrap">
    <canvas id="game" width="600" height="500"></canvas>
    <div id="game-over-overlay" role="dialog" aria-label="Game over">
      <h2>GAME OVER</h2>
      <p id="overlay-score">Score: 0</p>
      <button type="button" id="overlay-restart">Play Again</button>
    </div>
  </div>

  <div id="controls" aria-label="Move snake">
    <span class="empty"></span>
    <button type="button" data-dir="0,-1" aria-label="Up">▲</button>
    <span class="empty"></span>
    <button type="button" data-dir="-1,0" aria-label="Left">◀</button>
    <span class="empty"></span>
    <button type="button" data-dir="1,0" aria-label="Right">▶</button>
    <span class="empty"></span>
    <button type="button" data-dir="0,1" aria-label="Down">▼</button>
    <span class="empty"></span>
  </div>

  <div id="action-bar" aria-label="Game actions">
    <button type="button" id="pause-btn">Pause</button>
    <button type="button" id="restart-btn">Play Again</button>
  </div>

  <script>
    const CELL = 20;
    const GRID_W = 30;
    const GRID_H = 25;
    const INITIAL_TICK = 200;
    const SPEED_STEP = 10;
    const MIN_TICK = 50;

    const BG = "#0a0a0a";
    const GRID = "#282828";
    const HEAD = "#22c55e";
    const BODY = "#16a34a";
    const FOOD = "#ef4444";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restart-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const gameOverOverlay = document.getElementById("game-over-overlay");
    const overlayScore = document.getElementById("overlay-score");
    const overlayRestart = document.getElementById("overlay-restart");

    let body, direction, growPending, food, score, highScore, gameOver, paused, tickMs, timer;

    function setGameOverUI(show) {
      gameOverOverlay.classList.toggle("show", show);
      restartBtn.classList.toggle("show", show);
      if (show) overlayScore.textContent = `Score: ${score}`;
      pauseBtn.textContent = paused && !gameOver ? "Resume" : "Pause";
    }

    function reset() {
      const cx = Math.floor(GRID_W / 2);
      const cy = Math.floor(GRID_H / 2);
      body = [[cx, cy], [cx - 1, cy], [cx - 2, cy]];
      direction = [1, 0];
      growPending = 0;
      food = spawnFood();
      score = 0;
      gameOver = false;
      paused = false;
      tickMs = INITIAL_TICK;
      highScore = Number(localStorage.getItem("snakeHigh") || 0);
      setGameOverUI(false);
      updateStatus();
      draw();
      scheduleTick();
    }

    function head() { return body[0]; }

    function spawnFood() {
      while (true) {
        const p = [
          Math.floor(Math.random() * GRID_W),
          Math.floor(Math.random() * GRID_H),
        ];
        if (!body.some(([x, y]) => x === p[0] && y === p[1])) return p;
      }
    }

    function setDir(dx, dy) {
      if (gameOver || paused) return;
      if (dx === -direction[0] && dy === -direction[1]) return;
      direction = [dx, dy];
    }

    function move() {
      const [hx, hy] = head();
      const [dx, dy] = direction;
      body.unshift([hx + dx, hy + dy]);
      if (growPending > 0) growPending--;
      else body.pop();
    }

    function collided() {
      const [x, y] = head();
      if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return true;
      return body.slice(1).some(([bx, by]) => bx === x && by === y);
    }

    function tick() {
      if (!gameOver && !paused) {
        move();
        const [hx, hy] = head();
        if (hx === food[0] && hy === food[1]) {
          growPending++;
          score += 10;
          tickMs = Math.max(MIN_TICK, tickMs - SPEED_STEP);
          food = spawnFood();
        }
        if (collided()) {
          gameOver = true;
          highScore = Math.max(highScore, score);
          localStorage.setItem("snakeHigh", String(highScore));
          setGameOverUI(true);
        }
        draw();
        updateStatus();
      }
      scheduleTick();
    }

    function scheduleTick() {
      clearTimeout(timer);
      timer = setTimeout(tick, tickMs);
    }

    function updateStatus() {
      let extra = "";
      if (gameOver) extra = " — Tap Play Again";
      else if (paused) extra = " — PAUSED";
      statusEl.textContent =
        `Score: ${score} · High: ${highScore} · ${tickMs}ms${extra}`;
    }

    function draw() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = GRID;
      for (let x = 0; x <= canvas.width; x += CELL) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += CELL) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      const pad = 2;
      const [fx, fy] = food;
      ctx.fillStyle = FOOD;
      ctx.beginPath();
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, CELL / 2 - pad, 0, Math.PI * 2);
      ctx.fill();

      body.forEach(([gx, gy], i) => {
        ctx.fillStyle = i === 0 ? HEAD : BODY;
        ctx.fillRect(gx * CELL + pad, gy * CELL + pad, CELL - pad * 2, CELL - pad * 2);
      });
    }

    function tryRestart() {
      if (gameOver) reset();
    }

    const keyMap = {
      ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
      ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
      ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
      ArrowRight: [1, 0], d: [1, 0], D: [1, 0],
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "p" || e.key === "P") {
        if (!gameOver) {
          paused = !paused;
          pauseBtn.textContent = paused ? "Resume" : "Pause";
          updateStatus();
        }
        e.preventDefault();
        return;
      }
      if (gameOver && (e.key === " " || e.key === "Enter")) {
        tryRestart();
        e.preventDefault();
        return;
      }
      if (keyMap[e.key]) {
        setDir(...keyMap[e.key]);
        e.preventDefault();
      }
    });

    document.querySelectorAll("#controls button[data-dir]").forEach((btn) => {
      const handler = (e) => {
        e.preventDefault();
        const [dx, dy] = btn.dataset.dir.split(",").map(Number);
        setDir(dx, dy);
      };
      btn.addEventListener("click", handler);
      btn.addEventListener("touchend", handler, { passive: false });
    });

    [restartBtn, overlayRestart].forEach((btn) => {
      const handler = (e) => {
        e.preventDefault();
        tryRestart();
      };
      btn.addEventListener("click", handler);
      btn.addEventListener("touchend", handler, { passive: false });
    });

    pauseBtn.addEventListener("click", () => {
      if (gameOver) return;
      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
      updateStatus();
    });

    reset();
  </script>
</body>
</html>
