services:
  snake:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-10000}:${PORT:-10000}"
    environment:
      PORT: "${PORT:-10000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"PORT\",\"10000\")}/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
